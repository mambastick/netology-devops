name: netology-elk

services:
  elasticsearch-hot:
    image: elasticsearch:7.17.0
    container_name: netology-elasticsearch-hot
    environment:
      - node.name=elasticsearch-hot
      - cluster.name=netology-elk
      - node.roles=master,data_hot,data_content,ingest
      - discovery.seed_hosts=elasticsearch-hot,elasticsearch-warm
      - cluster.initial_master_nodes=elasticsearch-hot
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_hot_data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - elk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  elasticsearch-warm:
    image: elasticsearch:7.17.0
    container_name: netology-elasticsearch-warm
    environment:
      - node.name=elasticsearch-warm
      - cluster.name=netology-elk
      - node.roles=data_warm,ingest
      - discovery.seed_hosts=elasticsearch-hot,elasticsearch-warm
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_warm_data:/usr/share/elasticsearch/data
    networks:
      - elk
    restart: unless-stopped
    depends_on:
      - elasticsearch-hot
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  logstash:
    image: logstash:7.17.0
    container_name: netology-logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - XPACK_MONITORING_ENABLED=false
    ports:
      - 5044:5044
      - 5000:5000
    networks:
      - elk
    restart: unless-stopped
    depends_on:
      elasticsearch-hot:
        condition: service_healthy

  kibana:
    image: kibana:7.17.0
    container_name: netology-kibana
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - 5601:5601
    networks:
      - elk
    restart: unless-stopped
    depends_on:
      elasticsearch-hot:
        condition: service_healthy

  filebeat:
    image: elastic/filebeat:7.17.0
    container_name: netology-filebeat
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - elk
    restart: unless-stopped
    depends_on:
      - logstash

networks:
  elk:
    driver: bridge

volumes:
  elasticsearch_hot_data: {}
  elasticsearch_warm_data: {}
