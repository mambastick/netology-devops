input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json
    tags => ["tcp-json"]
  }
}

output {
  if "tcp-json" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch-hot:9200"]
      index => "logstash-tcp-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch-hot:9200"]
      index => "logstash-docker-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }
}
