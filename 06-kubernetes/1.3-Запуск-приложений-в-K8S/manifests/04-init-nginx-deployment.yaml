apiVersion: apps/v1
kind: Deployment
metadata:
  name: init-nginx
  labels:
    app: init-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: init-nginx
  template:
    metadata:
      labels:
        app: init-nginx
    spec:
      initContainers:
        - name: wait-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nslookup init-nginx-svc.kuber-1-3.svc.cluster.local; do echo "waiting for service"; sleep 2; done
      containers:
        - name: nginx
          image: nginx:1.25.5
          ports:
            - containerPort: 80
