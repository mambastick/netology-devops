apiVersion: v1
kind: Pod
metadata:
  name: local-inspector
  namespace: kuber-2-2
spec:
  nodeSelector:
    kubernetes.io/hostname: k8s-wk-01
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      volumeMounts:
        - name: local-data
          mountPath: /data
  volumes:
    - name: local-data
      hostPath:
        path: /tmp/kuber-2-2-local-pv
        type: Directory
