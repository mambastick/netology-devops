apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-storage-app
  namespace: kuber-2-2
  labels:
    app: nfs-storage-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-storage-app
  template:
    metadata:
      labels:
        app: nfs-storage-app
    spec:
      containers:
        - name: multitool
          image: wbitt/network-multitool:alpine-extra
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: HTTPS_PORT
              value: "8443"
          volumeMounts:
            - name: nfs-data
              mountPath: /data
      volumes:
        - name: nfs-data
          persistentVolumeClaim:
            claimName: nfs-pvc
