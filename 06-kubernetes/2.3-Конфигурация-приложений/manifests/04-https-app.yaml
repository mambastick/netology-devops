apiVersion: apps/v1
kind: Deployment
metadata:
  name: https-app
  labels:
    app: https-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: https-app
  template:
    metadata:
      labels:
        app: https-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.5
          ports:
            - containerPort: 80
          volumeMounts:
            - name: https-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: https-page
          configMap:
            name: https-page
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: https-app-svc
spec:
  selector:
    app: https-app
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: https-app
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kuber-2-3.local
      secretName: netology-tls
  rules:
    - host: kuber-2-3.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: https-app-svc
                port:
                  number: 80
