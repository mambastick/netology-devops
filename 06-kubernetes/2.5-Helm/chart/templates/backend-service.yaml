apiVersion: v1
kind: Service
metadata:
  name: {{ include "netology-app.fullname" . }}-backend
  labels:
    {{- include "netology-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
