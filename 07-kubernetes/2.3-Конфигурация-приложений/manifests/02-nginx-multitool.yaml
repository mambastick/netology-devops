apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-app
  labels:
    app: config-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-app
  template:
    metadata:
      labels:
        app: config-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.5
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
        - name: multitool
          image: wbitt/network-multitool:alpine-extra
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8080
      volumes:
        - name: app-page
          configMap:
            name: app-config
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: config-app-svc
spec:
  selector:
    app: config-app
  ports:
    - name: http
      port: 80
      targetPort: 80
